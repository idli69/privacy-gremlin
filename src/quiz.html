<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/src/style.css" />
    <title>Quiz Page</title>
    <script src="/src/quiz.js" defer></script>
  </head>
  <body class="bg-background text-fg flex-center min-h-screen">
    <!-- ───────────── START SCREEN ───────────── -->
    <div id="start-screen" class="card m-5">
      <h1 class="mt-1 text-2xl font-bold">Privacy Gremlin Quiz</h1>
      <p class="text-muted text-center">
        Find out how well you protect your privacy online.
      </p>
      <button id="start-btn" class="btn-primary my-4">Start</button>
    </div>

    <!-- ───────────── QUIZ SCREEN ───────────── -->
    <div id="quiz-screen" class="hidden w-full">
      <label>
        <progress
          class="absolute top-0 w-full items-center"
          id="progress-bar"
        ></progress>
      </label>

      <div id="question" class="m-10 self-start">
        <!--question will be added by quiz.js-->
      </div>
      <div id="answers" class="w-full">
        <div id="options" class="grid grid-cols-1 gap-3">
          <!--answers will be added by quiz.js-->
        </div>
        <div id="buttons" class="flex w-full justify-end p-10">
          <button id="next-btn" class="btn-ghost">Next</button>
        </div>
      </div>
    </div>

    <!-- ───────────── RESULT SCREEN ───────────── -->
    <div id="result-screen" class="hidden w-full">
      <h1 class="mt-1 text-2xl font-bold">Your Privacy Gremlin Score</h1>
      <div id="result-score" class="text-fg-muted text-sm"></div>
      <p id="result-advice"></p>
      <div class="flex gap-3">
        <button id="restart-btn" class="btn-primary">Try Again</button>
      </div>
    </div>
  </body>
</html>
