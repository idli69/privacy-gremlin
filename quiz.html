<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/src/style.css" />
    <title>Privacy Quiz</title>
    <script type="module" src="/src/quiz.js"></script>
  </head>
  <body class="quiz-body">
    <!--START SCREEN-->
    <div id="start-screen" class="card quiz-card">
      <h1 class="quiz-title">Privacy Gremlin Quiz</h1>
      <p class="quiz-text">
        Find out how well you protect your privacy online.
        <br />
        Answer 10 quesitons.
      </p>
      <button id="start-btn" class="btn btn-primary">Start</button>
    </div>

    <!--QUIZ SCREEN-->
    <div id="quiz-screen" class="card quiz-card hidden">
      <div id="question" class="quiz-question">
        <!--question will be added by quiz.js-->
      </div>

      <div id="answers" class="quiz-answers">
        <div id="options" class="quiz-options">
          <!--answers will be added by quiz.js-->
        </div>

        <div id="buttons" class="quiz-actions">
          <button id="next-btn" class="btn btn-secondary">Next</button>
        </div>
      </div>
    </div>

    <!--RESULT SCREEN-->
    <div id="result-screen" class="card quiz-card hidden">
      <h1 class="quiz-title">Gremlin Score</h1>
      <div id="result-score" class="result-score"></div>
      <p id="result-advice" class="result-advice"></p>

      <div class="flex gap-3">
        <a class="btn btn-secondary" href="index.html">Go Back</a>
      </div>
    </div>
  </body>
</html>
