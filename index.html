<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./src/style.css" />
    <title>Privacy Gremlin</title>
  </head>
  <body class="bg-background text-fg font-display">
    <!--NAVBAR SECTION BEGIN-->
    <nav class="bg-elevated flex min-h-15 items-center justify-between p-3">
      <div class="flex items-center gap-1">
        <img
          src="./assets/images/gremlins/magnifying.png"
          alt="Gremlin picture"
          class="mr-1 w-10"
        />
        <p class="text-[clamp(1.25rem,4vw,2rem)] font-bold">Privacy Gremlin</p>
      </div>

      <button class="btn-primary text-[clamp(0.8rem,3vw,1.2rem)]" type="button">
        Take Quiz
      </button>
    </nav>
    <!--NAVBAR SECTION END-->
    <!--HERO SECTION BEGIN-->
    <section
      id="hero"
      class="grid min-h-[calc(100vh-60px)] grid-cols-1 gap-8 px-4 py-8 md:grid-cols-5 md:items-center md:px-8 md:py-20"
    >
      <div
        id="hero-img"
        class="order-1 flex justify-center md:col-span-2 md:justify-end"
      >
        <img
          src="./assets/images/gremlins/gremlin-hero.png"
          alt="Hero Gremlin Image"
          class="w-60 max-w-full md:w-72 lg:w-80"
        />
      </div>
      <div
        id="hero-text"
        class="order-2 flex max-w-xl flex-col items-center space-y-5 text-center md:col-span-3 md:items-start md:text-left"
      >
        <h1 class="text-[clamp(2rem,4vw,3.2rem)] font-bold">
          Find out how cursed your privacy habits are.
        </h1>
        <p class="text-accent-dark text-[clamp(.8rem,2vw,1.2rem)]">
          A tiny privacy checkup for people who know they should be more careful
          online, but keep ignoring it.
        </p>
        <button class="btn-ghost text-xl" type="button">Quiz Yourself</button>
      </div>
    </section>
    <!--HERO SECTION END-->
  </body>
</html>
